[service.web]
buildCommand = "pnpm install && pnpm --filter @cavaticus/shared build && pnpm --filter @cavaticus/web build"
startCommand = "pnpm --filter @cavaticus/web preview --host 0.0.0.0 --port $PORT"

[service.api]
buildCommand = "pnpm install && pnpm --filter @cavaticus/shared build && pnpm --filter @cavaticus/api build"
startCommand = "node apps/api/dist/index.js"

[service.agent]
rootDirectory = "apps/agent"
builder = "dockerfile"
